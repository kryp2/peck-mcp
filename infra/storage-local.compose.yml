# Local testnet storage.peck.to (uhrp-storage-server) for hackathon dev.
#
# Boots:
#   - fake-gcs-server (fsouza/fake-gcs-server) — implements the GCS HTTP API
#     on a local volume so storage-server's @google-cloud/storage works
#     without real GCP. Auto-creates buckets on demand.
#   - storage-local — the uhrp-storage-server itself, built from
#     ../../storage-server/. Connects to bank-local (BRC-100 StorageServer
#     on bank-local_default network) for its wallet backend.
#
# Run from this directory:
#   docker compose -p storage-local -f storage-local.compose.yml up -d --build
#
# Pre-reqs:
#   - bank-local stack must be up first (we attach to its docker network for
#     wallet backend access)
#
# Endpoints:
#   http://localhost:8090       — uhrp-storage-server (HTTP_PORT 8080 inside)
#   http://localhost:4443       — fake-gcs-server (GCS-compatible API)
#
# Notes:
#   - PRICE_PER_GB_MO=0 → payment middleware skips, no 402 challenge needed
#   - NODE_ENV=development → getUploadURL returns local pretend URL
#   - storage-server's `auth-express-middleware` is created with
#     `allowUnauthenticated: true`, so /upload + /find work without BRC-100
#     handshake when paired with PRICE=0 (auth still required for routes
#     that read req.auth.identityKey, which is provided by middleware even
#     for unauthenticated peers — set later if needed)

networks:
  default:
    name: storage-local_default
  bank:
    name: bank-local_default
    external: true

services:
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: fake-gcs
    command:
      - "-scheme=http"
      - "-port=4443"
      - "-public-host=fake-gcs:4443"
      - "-external-url=http://fake-gcs:4443"
      - "-data=/data"
    ports:
      - "4443:4443"
    volumes:
      - fake_gcs_data:/data

  storage-pg:
    image: postgres:15-alpine
    container_name: storage-pg
    environment:
      POSTGRES_DB: peck_storage
      POSTGRES_USER: storage
      POSTGRES_PASSWORD: storagepass
    ports:
      - "5434:5432"
    volumes:
      - storage_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage -d peck_storage"]
      interval: 5s
      timeout: 3s
      retries: 20

  storage-local:
    build:
      context: ../../storage-server
      dockerfile: Dockerfile
    container_name: storage-local
    depends_on:
      storage-pg:
        condition: service_healthy
      fake-gcs:
        condition: service_started
    ports:
      - "8090:8080"
    networks:
      - default
      - bank
    volumes:
      # Fake GCP service account so @google-cloud/storage's V4 signer has
      # SOMETHING to sign with. fake-gcs ignores the signature, but the SDK
      # itself crashes without credentials.
      - ./fake-sa.json:/app/fake-sa.json:ro
    environment:
      # production so prodUploadFunction runs and emits signed URLs against
      # fake-gcs (which honours STORAGE_EMULATOR_HOST). dev mode short-circuits
      # to a stub URL that doesn't actually persist anything.
      NODE_ENV: production
      # Skip the storage-server crypto-polyfill that aliases window→globalThis.
      # That alias makes google-auth-library use BrowserCrypto.sign which
      # crashes on JWK import against Node 22's webcrypto. See
      # storage-server/src/crypto-polyfill.ts for the gate.
      STORAGE_LOCAL_NO_BROWSER_POLYFILL: "1"
      HTTP_PORT: "8080"
      BSV_NETWORK: testnet

      # Throwaway server identity (independent from bank-local's identity)
      SERVER_PRIVATE_KEY: "9d2c4a1e7f3b6058e1c4d2a3b5e6f78901a2b3c4d5e6f7081a2b3c4d5e6f70812"

      # Wallet backend = bank-local's BRC-100 StorageServer (port 8081 inside
      # the bank-local network → reached via container hostname "bank-local")
      WALLET_STORAGE_URL: "http://bank-local:8081"

      # GCS emulator
      STORAGE_EMULATOR_HOST: "http://fake-gcs:4443"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/fake-sa.json"
      GCP_PROJECT_ID: "peck-storage-local"
      BUCKET_NAME: "peck-storage-local"
      GCP_BUCKET_NAME: "peck-storage-local"

      # Pricing — free for ecosystem dev
      PRICE_PER_GB_MO: "0"
      MIN_HOSTING_MINUTES: "0"

      # Hosting domain for UHRP advertisements
      HOSTING_DOMAIN: "http://localhost:8090"

      # storage-server's own knex db
      KNEX_DB_CONNECTION: '{"host":"storage-pg","port":5432,"user":"storage","password":"storagepass","database":"peck_storage"}'
      DB_CLIENT: "pg"

volumes:
  fake_gcs_data:
  storage_pg_data:
