# Local testnet bank.peck.to (wallet-infra) for hackathon dev.
#
# Boots a Postgres + the wallet-infra container against BSV testnet,
# isolated from any prod-like instance. The hackathon agents use this
# instead of WoC + raw arc.ts for UTXO state, signing, and broadcast.
#
# Run from this directory:
#   docker compose -p bank-local -f bank-local.compose.yml up -d --build
#
# Stop:
#   docker compose -p bank-local -f bank-local.compose.yml down
#
# Endpoints:
#   http://localhost:8088   — internal REST API (createAction, listOutputs,
#                              balance, state/*) — no auth, dev-only
#   http://localhost:8089   — BRC-100 StorageServer (auth-protected)
#   localhost:5433          — Postgres (wallet/walletpass, db wallet_storage)

services:
  bank-local-pg:
    image: postgres:15-alpine
    container_name: bank-local-pg
    environment:
      POSTGRES_DB: wallet_storage
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: walletpass
    ports:
      - "5433:5432"
    volumes:
      - bank_local_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet_storage"]
      interval: 5s
      timeout: 3s
      retries: 20

  bank-local:
    build:
      context: ../../wallet-infra
      dockerfile: Dockerfile
    container_name: bank-local
    depends_on:
      bank-local-pg:
        condition: service_healthy
    ports:
      - "8088:8080"   # internal REST API (createAction, listOutputs, state/*)
      - "8089:8081"   # BRC-100 StorageServer
    environment:
      NODE_ENV: development
      BSV_NETWORK: test
      PORT: "8080"
      HTTP_PORT: "8081"
      DB_CLIENT: pg
      # Throwaway test key — ONLY for local testnet, never use anywhere else.
      SERVER_PRIVATE_KEY: "bffe0d7a3f7effce2b3511323c6cca1df1649e41a336a8b603194d53287ad285"
      KNEX_DB_CONNECTION: '{"host":"bank-local-pg","port":5432,"user":"wallet","password":"walletpass","database":"wallet_storage"}'
      # 1 sat/kb is mainnet-realistic. The default 100 sat/kb is testnet-flat
      # and creates a fragmentation death spiral when wallet-toolbox splits
      # change into many small outputs (each input would cost more in fees
      # than it contains).
      FEE_MODEL: '{"model":"sat/kb","value":1}'
      COMMISSION_FEE: "0"
      ENABLE_NGINX: "false"
      # Pass TAAL API key so wallet-toolbox Services has a working
      # provider for getRawTx, getMerklePath, postBeef on testnet.
      # Hackathon-only key — same one used by the agents.
      TAAL_API_KEY: "testnet_d5baef21372e128894479d5d993202a6"
      # Override wallet-toolbox default change-basket sizing.
      # Upstream uses 144/32 (parallelism-friendly, fragmentation-prone).
      # We want 1 big change output per createAction so the fee economics
      # work at high tx counts. See PECK PAY PATCH note in
      # wallet-toolbox/src/storage/StorageReaderWriter.ts.
      WALLET_INFRA_BASKET_NUM_DESIRED_UTXOS: "1"
      WALLET_INFRA_BASKET_MIN_DESIRED_UTXO_VALUE: "1000"

volumes:
  bank_local_pg:
