# Deploy openrun.peck.to to Cloud Run.
# Build context is the workspace root (peck-to/) so the image can copy peck-ui.
# Run from peck-to/ :
#   gcloud builds submit --config peck-mcp/openrun/cloudbuild.yaml .

substitutions:
  _SERVICE: openrun
  _REGION: europe-west1
  _PROJECT: gen-lang-client-0447933194

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - peck-mcp/openrun/Dockerfile
      - -t
      - europe-west1-docker.pkg.dev/${_PROJECT}/peck/${_SERVICE}:$SHORT_SHA
      - -t
      - europe-west1-docker.pkg.dev/${_PROJECT}/peck/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/${_PROJECT}/peck/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=europe-west1-docker.pkg.dev/${_PROJECT}/peck/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080

options:
  machineType: E2_HIGHCPU_8

images:
  - europe-west1-docker.pkg.dev/${_PROJECT}/peck/${_SERVICE}
